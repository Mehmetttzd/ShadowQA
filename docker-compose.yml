services:
  postgres:
    image: postgres:16
    container_name: shadowqa-postgres
    environment:
      POSTGRES_USER: shadowqa
      POSTGRES_PASSWORD: shadowqa
      POSTGRES_DB: shadowqa
    ports:
      - "5450:5432"
    volumes:
      - shadowqa_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: shadowqa-redis
    ports:
      - "6390:6379"

volumes:
  shadowqa_postgres_data: